<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaturaLinka</title>
    <link rel="stylesheet" href="Homepage.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="Homepage.html" aria-label="Към началната страница">
                <span class="brand-mark" aria-hidden="true"></span>
                <span class="brand-text">NaturaLinka</span>
            </a>

            <nav class="topbar-actions" aria-label="Основна навигация">
                <a class="icon-btn" href="Homepage.html">
                    <span class="icon" aria-hidden="true">&#127968;</span>
                    <span class="label">Начало</span>
                </a>
                <a class="icon-btn" href="notifikacii.html">
                    <span class="icon" aria-hidden="true">&#128276;</span>
                    <span class="label">Известия</span>
                </a>
                <a class="icon-btn" href="profil.html">
                    <span class="icon" aria-hidden="true">&#128100;</span>
                    <span class="label">Профил</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="page">
        <form id="searchForm" class="section-card" autocomplete="off">
            <div class="section-header">
                <span class="section-icon" aria-hidden="true">&#128269;</span>
                <h2 class="section-title">Търсене на продукти</h2>
            </div>

            <div class="filter-row">
                <div class="filter-field dropdown-wrap">
                    <label for="productInput">Продукт</label>
                    <input
                        id="productInput"
                        name="product"
                        class="styled-input"
                        type="text"
                        placeholder="Всички продукти"
                        autocomplete="off"
                    >
                    <div class="custom-dropdown" id="productDropdown"></div>
                </div>

                <div class="filter-field dropdown-wrap">
                    <label for="locationInput">Регион</label>
                    <input
                        id="locationInput"
                        name="location"
                        class="styled-input"
                        type="text"
                        placeholder="Всички региони"
                        autocomplete="off"
                    >
                    <div class="custom-dropdown" id="locationDropdown"></div>
                </div>

                <div class="filter-field dropdown-wrap">
                    <label for="maxPriceInput">Макс. цена</label>
                    <input
                        id="maxPriceInput"
                        name="maxPrice"
                        class="styled-input"
                        type="text"
                        placeholder="0.00 €"
                        autocomplete="off"
                    >
                    <div class="custom-dropdown" id="maxPriceDropdown"></div>
                </div>

                <div class="filter-buttons">
                    <button id="searchBtn" class="btn btn-primary" type="submit">&#128269; Търси</button>
                    <button id="resetBtn" class="btn btn-ghost" type="button">Изчисти</button>
                </div>
            </div>
        </form>

        <section class="section-card" aria-labelledby="offer-section-title">
            <div class="section-header">
                <span class="section-icon" aria-hidden="true">&#128221;</span>
                <h2 id="offer-section-title" class="section-title">Създаване на обява</h2>
            </div>

            <form id="offerForm" class="offer-layout">
                <div class="offer-left">
                    <div class="offer-image-wrapper">
                        <label class="offer-image-label" for="offerPhoto">
                            <div id="offerPhotoPlaceholder" class="offer-image-placeholder">
                                <span class="upload-icon-big" aria-hidden="true">&#128247;</span>
                                <p class="offer-placeholder-text">Прикачи снимка</p>
                                <span class="btn btn-primary btn-sm">Избери файл</span>
                            </div>
                            <img id="offerPhotoPreview" class="offer-image-preview" alt="Преглед на снимката" hidden>
                        </label>

                        <button
                            type="button"
                            id="offerPhotoChange"
                            class="offer-photo-change"
                            title="Смени снимка"
                            aria-label="Смени снимка"
                        >
                            &#8635;
                        </button>
                    </div>

                    <input type="file" id="offerPhoto" name="photo" accept="image/*" hidden>

                    <div class="offer-image-actions">
                        <button type="submit" id="offerSaveBtn" class="btn btn-accent btn-publish-main">
                            Публикувай обява
                        </button>
                    </div>
                </div>

                <div class="offer-right">
                    <div class="offer-fields-row">
                        <div class="offer-field">
                            <label for="offerProduct">Име на продукта</label>
                            <input
                                id="offerProduct"
                                name="product"
                                class="styled-input"
                                type="text"
                                placeholder="напр. Домати от градината"
                                required
                            >
                        </div>

                        <div class="offer-field">
                            <label for="offerRegion">Местоположение</label>
                            <input
                                id="offerRegion"
                                name="region"
                                class="styled-input"
                                type="text"
                                placeholder="Град или село"
                            >
                        </div>
                    </div>

                    <div class="offer-fields-row">
                        <div class="offer-field">
                            <label for="offerPrice">Цена (€)</label>
                            <div class="input-suffix-wrap">
                                <input
                                    id="offerPrice"
                                    name="price"
                                    class="styled-input"
                                    type="text"
                                    placeholder="0.00"
                                    inputmode="decimal"
                                    required
                                >
                                <span class="input-suffix">€</span>
                            </div>
                        </div>
                    </div>

                    <div class="offer-field">
                        <label for="offerDescription">Описание</label>

                        <textarea
                            id="offerDescription"
                            name="description"
                            class="styled-textarea"
                            placeholder="Разкажи повече за продукта..."
                            rows="3"
                        ></textarea>

                        <p id="offerStatus" class="form-status" aria-live="polite"></p>
                    </div>
                </div>
            </form>
        </section>

        <section class="section-card results-section" aria-labelledby="results-section-title">
            <div class="section-header">
                <div>
                    <h2 id="results-section-title" class="section-title">Налични днес</h2>
                    <span id="resultsMeta" class="results-meta"></span>
                </div>
            </div>

            <div id="resultsScroll" class="results-scroll">
                <div id="resultsGrid" class="grid-layout"></div>

                <div id="emptyState" class="empty-state" hidden>
                    <div class="empty-title">Няма намерени резултати</div>
                </div>
            </div>
        </section>
    </main>

    <script src="Homepage.js" defer></script>
    <script src="nav-active.js" defer></script>
</body>
</html>
