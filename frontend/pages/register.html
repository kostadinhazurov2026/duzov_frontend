<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="login-container">
        <form id="registerForm">
            <div class="input-group">
                <label for="reg-email">Email Address</label>
                <div class="field-wrapper">
                    <input type="email" id="reg-email" placeholder="email@example.com" required>
                </div>
            </div>
            <div class="input-group">
                <label for="reg-password">Password</label>
                <div class="field-wrapper">
                    <input type="password" id="reg-password" placeholder="Create password" required>
                </div>
            </div>
            <div class="input-group">
                <label for="confirm-password">Confirm Password</label>
                <div class="field-wrapper">
                    <input type="password" id="confirm-password" placeholder="Repeat password" required>
                </div>
            </div>
            <button type="submit" id="registerBtn">Create Account</button>
        </form>
        <p class="register-text">
            Already have an account? <a href="login.html">Log In</a>
        </p>
    </div> 
    <script src="register.js"></script>
</body>
</html>
