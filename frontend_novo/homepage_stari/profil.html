<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Homepage.css">
    <title>Профил</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="topbar" aria-label="Горно меню">
        <div class="topbar-inner">
            <a class="brand" href="Homepage.html" aria-label="Начало">
                <span class="brand-mark" aria-hidden="true"></span>
                <span class="brand-text">Marketplace</span>
            </a>
            <nav class="topbar-actions">
                <a class="icon-btn" href="Homepage.html"><span class="icon">🏠</span><span class="label">Начало</span></a>
                <a class="icon-btn" href="notifikacii.html"><span class="icon">🔔</span><span class="label">Известия</span></a>
                <a class="icon-btn" href="profil.html"><span class="icon">👤</span><span class="label">Профил</span></a>
            </nav>
        </div>
    </header>

    <main class="page">
        <section class="panel-card profile-card">
            <form id="profileForm" class="profile-form">
                <!-- Profile Picture Section -->
                <div class="profile-picture-section">
                    <div class="profile-picture-container">
                        <input type="file" id="pfImage" name="image" class="profile-image-input" accept="image/*" hidden>
                        <label for="pfImage" class="profile-image-label">
                            <div class="profile-image-placeholder">
                                <span class="camera-icon">📷</span>
                                <p class="profile-image-text">(По избор)</p>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Form Fields Section -->
                <div class="profile-fields">
                    <div class="profile-field">
                        <label for="pfName">Потребителско име</label>
                        <input id="pfName" name="name" class="styled-input" placeholder="Въведи твоето име" required>
                    </div>
                    
                    <div class="profile-field">
                        <label for="pfEmail">Имейл за контакт</label>
                        <input id="pfEmail" name="email" class="styled-input" placeholder="example@mail.com" type="email" required>
                    </div>
                    
                    <div class="profile-field">
                        <label for="pfPhone">Телефон за контакт</label>
                        <input id="pfPhone" name="phone" class="styled-input" placeholder="+359 123 456 789" required>
                    </div>
                </div>

                <p id="profileStatus" class="form-status" aria-live="polite"></p>

                <!-- Action Buttons -->
                <div class="profile-actions">
                    <button class="btn btn-primary btn-create" type="submit">Запази профил</button>
                </div>
            </form>
        </section>
    </main>
    <script src="profil.js" defer></script>
    <script src="nav-active.js" defer></script>
</body>
</html>
