<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace • Производители и купувачи</title>
    <meta name="description" content="Търси по продукт, регион, количество и максимална цена и виж резултатите отдолу.">
    <link rel="stylesheet" href="Homepage.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="topbar" aria-label="Горно меню">
        <div class="topbar-inner">
            <a class="brand" href="Homepage.html" aria-label="Начало">
                <span class="brand-mark" aria-hidden="true"></span>
                <span class="brand-text">Marketplace</span>
            </a>

            <nav class="topbar-actions home-actions" aria-label="Действия">
                <a id="newAdBtn" class="icon-btn primary" href="obyava.html">
                    <span class="icon" aria-hidden="true">＋</span>
                    <span class="label">Нова обява</span>
                </a>
                
                <a id="notifBtn" class="icon-btn" href="notifikacii.html" aria-label="Нотификации">
                    <span class="icon" aria-hidden="true">🔔</span>
                    <span class="dot" aria-hidden="true"></span>
                </a>
                
                <a id="profileBtn" class="icon-btn" href="profil.html" aria-label="Профил">
                    <span class="icon" aria-hidden="true">👤</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="page">
        <form id="searchForm" class="filter-card" autocomplete="off">
            <div class="filter-head">
                <div class="filter-title">Упътване</div>
                <div class="filter-subtitle">Избери филтри (или остави празно) и натисни “Търси”. Всяко поле е отделна кутия с autocomplete.</div>
            </div>

            <div class="filter-grid">
                <div class="filter-item dropdown-wrap">
                        <label for="productInput">Продукт</label>
                        <input id="productInput" name="product" placeholder="" class="styled-input" autocomplete="off">
                        <div class="custom-dropdown" id="productDropdown"></div>
                </div>

                <div class="filter-item dropdown-wrap">
                        <label for="locationInput">Регион</label>
                        <input id="locationInput" name="location" placeholder="" class="styled-input" autocomplete="off">
                        <div class="custom-dropdown" id="locationDropdown"></div>
                </div>

                <div class="filter-item dropdown-wrap">
                        <label for="quantityInput">Количество</label>
                        <input id="quantityInput" name="quantity" placeholder="" class="styled-input" autocomplete="off">
                        <div class="custom-dropdown" id="quantityDropdown"></div>
                </div>

                <div class="filter-item dropdown-wrap">
                        <label for="maxPriceInput">Макс. цена</label>
                        <input id="maxPriceInput" name="maxPrice" placeholder="" class="styled-input" autocomplete="off">
                        <div class="custom-dropdown" id="maxPriceDropdown"></div>
                </div>
                </div>

            <div class="filter-actions">
                <button id="resetBtn" class="btn btn-ghost" type="button">Изчисти</button>
                <button id="searchBtn" class="btn btn-primary" type="submit">Търси</button>
            </div>
        </form>

        <section class="results-panel" aria-label="Резултати">
            <div class="results-head">
                <div class="results-title">Резултати</div>
                <div id="resultsMeta" class="results-meta"></div>
            </div>

            <div id="resultsScroll" class="results-scroll" aria-live="polite">
                <div id="resultsGrid" class="grid-layout"></div>

                <div id="emptyState" class="empty-state" hidden>
                    <div class="empty-title">Няма намерени резултати</div>
                </div>
            </div>
        </section>
    </main>

    <script src="Homepage.js" defer></script>
</body>
</html>
