<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace</title>
    <link rel="stylesheet" href="Homepage.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="Homepage.html">
                <span class="brand-mark"></span>
                <span class="brand-text">Marketplace</span>
            </a>
            <nav class="topbar-actions">
                <a class="icon-btn" href="Homepage.html"><span class="icon">🏠</span><span class="label">Начало</span></a>
                <a class="icon-btn" href="notifikacii.html"><span class="icon">🔔</span><span class="label">Известия</span></a>
                <a class="icon-btn" href="profil.html"><span class="icon">👤</span><span class="label">Профил</span></a>
            </nav>
        </div>
    </header>

    <main class="page">
        <!-- Секция 1: Филтри за търсене -->
        <form id="searchForm" class="section-card" autocomplete="off">
            <div id="1st" class="section-header">
                <span class="section-icon">🔍</span>
                <h2 class="section-title">Търсене на продукти</h2>
            </div>
            <div class="filter-row">
                <div class="filter-field dropdown-wrap">
                    <label for="productInput">Продукт</label>
                    <input id="productInput" name="product" placeholder="Всички продукти" class="styled-input" autocomplete="off">
                    <div class="custom-dropdown" id="productDropdown"></div>
                </div>
                <div class="filter-field dropdown-wrap">
                    <label for="locationInput">Регион</label>
                    <input id="locationInput" name="location" placeholder="Всички региони" class="styled-input" autocomplete="off">
                    <div class="custom-dropdown" id="locationDropdown"></div>
                </div>
                <div class="filter-field dropdown-wrap">
                    <label for="quantityInput">Количество</label>
                    <input id="quantityInput" name="quantity" placeholder="0.0 кг" class="styled-input" autocomplete="off">
                    <div class="custom-dropdown" id="quantityDropdown"></div>
                </div>
                <div class="filter-field dropdown-wrap">
                    <label for="maxPriceInput">Макс. цена</label>
                    <input id="maxPriceInput" name="maxPrice" placeholder="0.00 лв." class="styled-input" autocomplete="off">
                    <div class="custom-dropdown" id="maxPriceDropdown"></div>
                </div>
                <div class="filter-buttons">
                    <button id="searchBtn" class="btn btn-primary" type="submit">🔍 Търси</button>
                    <button id="resetBtn" class="btn btn-ghost" type="button">Изчисти</button>
                </div>
            </div>
        </form>

        <!-- Секция 2: Създаване на обява -->
        <section class="section-card">
            <div class="section-header">
                <span class="section-icon">📝</span>
                <h2 class="section-title">Създаване на обява</h2>
            </div>
            <form id="offerForm" class="offer-layout">
                <div class="offer-left">
                    <label class="offer-image-label" for="offerPhoto">
                        <div id="offerPhotoPlaceholder" class="offer-image-placeholder">
                            <span class="upload-icon-big">📷</span>
                            <p class="offer-placeholder-text">Прикачи снимка</p>
                            <span class="btn btn-primary btn-sm">Избери файл</span>
                        </div>
                        <img id="offerPhotoPreview" class="offer-image-preview" alt="Преглед" hidden>
                    </label>
                    <input type="file" id="offerPhoto" name="photo" accept="image/*" hidden>
                </div>
                <div class="offer-right">
                    <div class="offer-fields-row">
                        <div class="offer-field">
                            <label for="offerProduct">Име на продукта</label>
                            <input id="offerProduct" name="product" class="styled-input" placeholder="напр. Домати от градината" required>
                        </div>
                        <div class="offer-field">
                            <label for="offerRegion">Местоположение</label>
                            <input id="offerRegion" name="region" class="styled-input" placeholder="Град или село">
                        </div>
                    </div>
                    <div class="offer-fields-row three-col">
                        <div class="offer-field">
                            <label for="offerQty">Количество</label>
                            <div class="input-suffix-wrap">
                                <input id="offerQty" name="quantity" class="styled-input" placeholder="0" inputmode="decimal" required>
                                <span class="input-suffix">кг</span>
                            </div>
                        </div>
                        <div class="offer-field">
                            <label for="offerPrice">Цена</label>
                            <div class="input-suffix-wrap">
                                <input id="offerPrice" name="price" class="styled-input" placeholder="0.00" inputmode="decimal" required>
                                <span class="input-suffix">лв.</span>
                            </div>
                        </div>
                    </div>
                    <div class="offer-field">
                        <label for="offerDescription">Описание</label>
                        <textarea id="offerDescription" name="description" class="styled-textarea" placeholder="Разкажи повече за продукта..." rows="3"></textarea>
                    </div>
                    <div class="offer-bottom">
                        <p id="offerStatus" class="form-status"></p>
                        <button type="submit" id="offerSaveBtn" class="btn btn-accent btn-publish">Публикувай обява</button>
                    </div>
                </div>
            </form>
        </section>

        <!-- Секция 3: Резултати -->
        <section class="section-card results-section">
            <div class="section-header">
                <div>
                    <h2 class="section-title">Налични днес</h2>
                    <span id="resultsMeta" class="results-meta"></span>
                </div>
            </div>
            <div id="resultsScroll" class="results-scroll">
                <div id="resultsGrid" class="grid-layout"></div>
                <div id="emptyState" class="empty-state" hidden>
                    <div class="empty-title">Няма намерени резултати</div>
                </div>
            </div>
        </section>
    </main>

    <script src="Homepage.js" defer></script>
    <script src="nav-active.js" defer></script>
</body>
</html>
