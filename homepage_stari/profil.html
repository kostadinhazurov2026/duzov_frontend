<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Homepage.css">
    <title>Профил</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="topbar" aria-label="Горно меню">
        <div class="topbar-inner">
            <a class="brand" href="Homepage.html" aria-label="Начало">
                <span class="brand-mark" aria-hidden="true"></span>
                <span class="brand-text">Marketplace</span>
            </a>
            <nav class="topbar-actions">
                <a class="icon-btn primary" href="obyava.html"><span class="icon">＋</span><span class="label">Нова обява</span></a>
                <a class="icon-btn" href="notifikacii.html"><span class="icon">🔔</span><span class="label">Нотификации</span></a>
                <a class="icon-btn" href="profil.html"><span class="icon">👤</span><span class="label">Профил</span></a>
                <a class="icon-btn" href="Homepage.html"><span class="icon">↩</span><span class="label">Към началото</span></a>
            </nav>
        </div>
    </header>

    <main class="page">
        <section class="panel-card">
            <div class="filter-title">Профил</div>
            <p class="filter-subtitle">Запази контактни данни и продукт, който предлагаш.</p>

            <form id="profileForm" class="stack" style="margin-top:14px;">
                <div class="filter-grid">
                    <div class="filter-item">
                        <label for="pfName">Име</label>
                        <input id="pfName" name="name" class="styled-input" placeholder="" required>
                    </div>
                    <div class="filter-item">
                        <label for="pfPhone">Телефон</label>
                        <input id="pfPhone" name="phone" class="styled-input" placeholder="" required>
                    </div>
                    <div class="filter-item">
                        <label for="pfRegion">Къде си</label>
                        <input id="pfRegion" name="region" class="styled-input" placeholder="">
                    </div>
                    <div class="filter-item">
                        <label for="pfProduct">Какво предлагаш</label>
                        <input id="pfProduct" name="product" class="styled-input" placeholder="">
                    </div>
                </div>
                <div class="filter-item">
                    <label for="pfPhoto">Снимка на продукта</label>
                    <input id="pfPhoto" name="photo" type="file" class="styled-input" accept="image/*">
                    <img id="pfPhotoPreview" class="photo-preview" alt="Преглед на снимка" hidden>
                </div>
                <p id="profileStatus" class="form-status" aria-live="polite"></p>
                <div class="filter-actions">
                    <button type="button" id="pfClear" class="btn btn-ghost">Изчисти</button>
                    <button class="btn btn-primary" type="submit">Запази профил</button>
                </div>
            </form>
        </section>
    </main>
    <script src="profil.js" defer></script>
</body>
</html>
